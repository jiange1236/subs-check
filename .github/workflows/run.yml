name: subs-check

on:
  workflow_dispatch:
  schedule:
    - cron: "40 22 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "README.md"
      - "LICENSE"
      
permissions:
  contents: write
  packages: write
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Docker Setup Docker
      uses: docker/setup-docker-action@v4

    - name: Docker Run
      run: |
        docker run -d --name subs-check -p 8199:8199 -v ./config:/app/config  -v ./output:/app/output --restart always ghcr.io/beck-8/subs-check:latest

    - name: Wait for the service to be up
      run: |
        sleep 30 # 等待容器启动
        docker logs subs-check


